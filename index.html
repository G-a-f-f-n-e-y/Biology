<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Egzèsis Aljèb Pwofesè a</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 50px; }
        h1 { color: #333; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; }
        input { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
        iframe { width: 100%; height: 600px; border: none; margin-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="box">
        <h1>Klas Matematik - Travay Pratik</h1>
        <p>Antre kòd devwa a oswa lyen anba a pou w kòmanse:</p>
        <input type="text" id="urlInput" placeholder="Tape ://roblox.com isit la...">
        <button onclick="louvriSit()">Lanse</button>
    </div>

    <iframe id="sitFrame"></iframe>

    <script>
        function louvriSit() {
            var url = document.getElementById('urlInput').value;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            var proxyUrl = "https://croxyproxy.com" + encodeURIComponent(url);
            var frame = document.getElementById('sitFrame');
            frame.src = proxyUrl;
            frame.style.display = "block";
        }
    </script>

</body>
</html>
