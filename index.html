<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pwojè Biyoloji - Selil yo</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #eef2f3; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        input { padding: 12px; width: 320px; border: 2px solid #007bff; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 24px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Laboratwa Biyoloji - Rechèch</h2>
        <p>Antre tèm rechèch la oswa lyen anba a:</p>
        <input type="text" id="siteUrl" value="www.roblox.com">
        <br><br>
        <button onclick="lanseSote()">Lanse Rechèch</button>
    </div>

    <script>
        function lanseSote() {
            var target = document.getElementById('siteUrl').value;
            // Fwa sa a nou itilize yon lòt sèvè proxy (BlockAway) ki louvri nan yon lòt paj nèt
            var finalUrl = "https://blockaway.net" + encodeURIComponent("https://" + target);
            window.open(finalUrl, '_blank');
        }
    </script>

</body>
</html>
